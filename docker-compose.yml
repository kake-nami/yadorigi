version: '3.8'

services:
  yadorigi:
    build: .
    ports:
      # ループバックバインド：ホスト外部から直接アクセスさせない
      # 外部公開する場合は nginx/Caddy 等のリバースプロキシを前段に置くこと
      - "127.0.0.1:3000:3000"
    volumes:
      # DBファイルをホストにマウント（データ永続化）
      - ./data:/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/yadorigi.db
      # X OAuth（オプション）
      # - X_OAUTH_CLIENT_ID=your_client_id
      # - X_OAUTH_CLIENT_SECRET=your_client_secret
      # keytar は Docker 内では D-Bus / OS キーチェーンが使えないため暗号化を無効化
      # ホストマシンで直接起動する場合は外してください
      - YADORIGI_NO_ENCRYPTION=1
    restart: unless-stopped
